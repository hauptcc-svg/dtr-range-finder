kind = "web"
previewPath = "/"
title = "DTR Trading Dashboard"
version = "1.0.0"
id = "artifacts/dtr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22372

[services.development]
run = "pnpm --filter @workspace/dtr-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dtr-dashboard", "run", "build" ]
publicDir = "artifacts/dtr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22372"
BASE_PATH = "/"
