kind = "web"
previewPath = "/dtr-python"
title = "DTR Trading Dashboard"
version = "1.0.0"
id = "artifacts/dtr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/dtr-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dtr-dashboard", "run", "build" ]
publicDir = "artifacts/dtr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8081"
BASE_PATH = "/"

[[services]]
name = "python"
paths = [ "/dtr-python" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/artifacts/dtr-python-app && PORT=5000 BASE_PATH=/dtr-python python flask_autonomous_trading.py"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/dtr-python-app && gunicorn -w 2 -b 0.0.0.0:5000 flask_autonomous_trading:app"]

[services.production.run.env]
PORT = "5000"
BASE_PATH = "/dtr-python"

[services.production.health.startup]
path = "/dtr-python/health"

[services.env]
PORT = "5000"
BASE_PATH = "/dtr-python"
